name: Build and Release

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ── Desktop: Windows / macOS / Linux ──────────────────────────────
  desktop:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri GUI
        uses: tauri-apps/tauri-action@action-v0.6.2
        id: tauri_build
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Z-Library NoProxy v__VERSION__"
          releaseBody: |
            ## 📚 Z-Library NoProxy v__VERSION__

            一个无需代理即可访问 Z-Library 的桌面应用。

            ---

            ### 🖥️ GUI 桌面版

            | 平台 | 安装包 |
            |------|--------|
            | Windows | `.msi` 或 `.exe` 安装程序 |
            | macOS | `.dmg` 安装程序 |
            | Linux | `.deb` / `.rpm` / `.AppImage` |

            ### 💻 CLI 命令行版

            | 平台 | 下载 |
            |------|------|
            | Windows | `zlibrary-cli-Windows-X64.zip` |
            | macOS | `zlibrary-cli-macOS-arm64.tar.gz` / `zlibrary-cli-macOS-x86_64.tar.gz` |
            | Linux | `zlibrary-cli-Linux-x86_64.tar.gz` |

            ### 📱 Android 版

            APK 文件请在 Actions 构建产物中下载。

            ---

            **使用说明：**
            - GUI 版本：下载安装后直接运行
            - CLI 版本：解压后在终端运行 `./zlibrary-cli`
          releaseDraft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Tauri GUI (no release)
        if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
        run: npm run tauri build

      - name: Build CLI binaries
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: src-tauri
        run: cargo build --release --features cli --bin zlibrary-cli --bin zlibrary-diagnose --bin zlibrary-fetch-challenge --bin zlibrary-show-script --bin zlibrary-test-search --bin zlibrary-regtest

      - name: Package CLI (Unix)
        if: startsWith(github.ref, 'refs/tags/') && runner.os != 'Windows'
        run: |
          mkdir -p cli-release
          cp src-tauri/target/release/zlibrary-cli cli-release/
          cp src-tauri/target/release/zlibrary-diagnose cli-release/
          cp src-tauri/target/release/zlibrary-fetch-challenge cli-release/
          cp src-tauri/target/release/zlibrary-show-script cli-release/
          cp src-tauri/target/release/zlibrary-test-search cli-release/
          cp src-tauri/target/release/zlibrary-regtest cli-release/
          cd cli-release && tar -czvf zlibrary-cli-${{ runner.os }}-${{ runner.arch }}.tar.gz *

      - name: Package CLI (Windows)
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'Windows'
        run: |
          mkdir cli-release
          Copy-Item src-tauri/target/release/zlibrary-cli.exe cli-release/
          Copy-Item src-tauri/target/release/zlibrary-diagnose.exe cli-release/
          Copy-Item src-tauri/target/release/zlibrary-fetch-challenge.exe cli-release/
          Copy-Item src-tauri/target/release/zlibrary-show-script.exe cli-release/
          Copy-Item src-tauri/target/release/zlibrary-test-search.exe cli-release/
          Copy-Item src-tauri/target/release/zlibrary-regtest.exe cli-release/
          Compress-Archive -Path cli-release/* -DestinationPath cli-release/zlibrary-cli-${{ runner.os }}-${{ runner.arch }}.zip

      - name: Upload CLI to release
        if: startsWith(github.ref, 'refs/tags/')
        run: gh release upload ${{ github.ref_name }} cli-release/zlibrary-cli-* --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
        with:
          name: zlibrary-${{ runner.os }}
          path: |
            src-tauri/target/release/bundle/
            !src-tauri/target/release/bundle/**/*.sig
            !src-tauri/target/release/bundle/**/*.json

  # ── Android (APK) ────────────────────────────────────────────────
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true

      - name: Install Rust Android targets
        run: |
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            x86_64-linux-android \
            i686-linux-android

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          yes | sdkmanager --install "ndk;26.1.10909125" > /dev/null 2>&1
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"
          echo "JAVA_HOME=$JAVA_HOME_17_X64" >> "$GITHUB_ENV"

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Install cargo-tauri
        run: cargo install tauri-cli --version "^2"

      - name: Init Android project
        run: cargo tauri android init --skip-targets-install

      - name: Build Android APK
        run: cargo tauri android build --apk
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zlibrary-android
          path: |
            src-tauri/gen/android/app/build/outputs/apk/
            src-tauri/gen/android/app/build/outputs/bundle/

